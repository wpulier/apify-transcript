name: Push Actor to Apify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m py_compile main.py src/apify_transcript/*.py
          python -m unittest discover -s tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Push to Apify
        id: push
        uses: apify/push-actor-action@master
        with:
          token: ${{ secrets.APIFY_TOKEN }}
          actor-id: kTgaX3cfI6dlJHa6J

      - name: Print build details
        run: echo "Build ${{ steps.push.outputs.build-id }} finished with status ${{ steps.push.outputs.build-status }}"
