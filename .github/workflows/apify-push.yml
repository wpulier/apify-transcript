name: Push Actor to Apify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m py_compile main.py src/apify_transcript/*.py
          python -m unittest discover -s tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Apify CLI
        uses: apify/setup-apify-cli-action@v1
        with:
          token: ${{ secrets.APIFY_TOKEN }}

      - name: Validate Apify input schema
        run: apify validate-schema .actor/INPUT_SCHEMA.json

      - name: Push to Apify
        env:
          APIFY_CLI_DISABLE_TELEMETRY: "1"
        run: apify push kTgaX3cfI6dlJHa6J --wait-for-finish=999999

      - name: Verify Apify latest build
        env:
          ACTOR_ID: kTgaX3cfI6dlJHa6J
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          actor_id = os.environ["ACTOR_ID"]
          token = os.environ["APIFY_TOKEN"]

          def get_json(url):
              with urllib.request.urlopen(url, timeout=30) as response:
                  return json.load(response)["data"]

          actor = get_json(f"https://api.apify.com/v2/acts/{actor_id}?token={token}")
          latest = (actor.get("taggedBuilds") or {}).get("latest") or {}
          build_id = latest.get("buildId")
          if not build_id:
              print("latest build tag was not found", file=sys.stderr)
              sys.exit(1)

          builds = get_json(f"https://api.apify.com/v2/acts/{actor_id}/builds?token={token}&limit=10&desc=1")
          build = next((item for item in builds.get("items", []) if item.get("id") == build_id), None)
          if not build:
              print(f"latest build {build_id} was not returned by the builds API", file=sys.stderr)
              sys.exit(1)

          status = build.get("status")
          print(f"Apify latest build {build_id} finished with status {status}")
          if status != "SUCCEEDED":
              sys.exit(1)
          PY
