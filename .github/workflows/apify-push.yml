name: Push Actor to Apify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m py_compile main.py src/apify_transcript/*.py
          python -m unittest discover -s tests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Apify CLI
        uses: apify/setup-apify-cli-action@v1
        with:
          token: ${{ secrets.APIFY_TOKEN }}

      - name: Validate Apify input schema
        run: |
          apify validate-schema .actor/INPUT_SCHEMA.json
          python -m json.tool .actor/openapi.json >/dev/null

      - name: Push to Apify
        env:
          APIFY_CLI_DISABLE_TELEMETRY: "1"
        run: apify push kTgaX3cfI6dlJHa6J --wait-for-finish=999999

      - name: Require full permissions for Console file uploads
        env:
          ACTOR_ID: kTgaX3cfI6dlJHa6J
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          from apify_client import ApifyClient

          actor_id = os.environ["ACTOR_ID"]
          token = os.environ["APIFY_TOKEN"]
          client = ApifyClient(token)
          actor_client = client.actor(actor_id)
          actor = actor_client.get()
          sample_input = json.dumps(
              {
                  "media": [
                      "https://raw.githubusercontent.com/wpulier/apify-transcript/main/samples/large-video-to-transcript-sample.mp3"
                  ]
              },
              indent=2,
          )
          standby = actor.get("actorStandby") or {}
          if (
              actor.get("actorPermissionLevel") != "FULL_PERMISSIONS"
              or (actor.get("exampleRunInput") or {}).get("body") != sample_input
              or not standby.get("isEnabled")
          ):
              actor_client.update(
                  actor_permission_level="FULL_PERMISSIONS",
                  example_run_input_body=sample_input,
                  example_run_input_content_type="application/json; charset=utf-8",
                  actor_standby_is_enabled=True,
                  actor_standby_build="latest",
                  actor_standby_memory_mbytes=2048,
                  actor_standby_idle_timeout_secs=300,
              )
              actor = actor_client.get()

          permission_level = actor.get("actorPermissionLevel")
          print(f"Actor permission level: {permission_level}")
          if permission_level != "FULL_PERMISSIONS":
              print("Actor permission level was not updated to FULL_PERMISSIONS", file=sys.stderr)
              sys.exit(1)
          example_body = (actor.get("exampleRunInput") or {}).get("body")
          print(f"Example input: {example_body}")
          if example_body != sample_input:
              print("Actor example input was not updated to the primary media field", file=sys.stderr)
              sys.exit(1)
          standby = actor.get("actorStandby") or {}
          print(f"Standby enabled: {standby.get('isEnabled')}")
          if not standby.get("isEnabled"):
              print("Actor Standby was not enabled", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Verify Apify latest build
        env:
          ACTOR_ID: kTgaX3cfI6dlJHa6J
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          actor_id = os.environ["ACTOR_ID"]
          token = os.environ["APIFY_TOKEN"]

          def get_json(url):
              with urllib.request.urlopen(url, timeout=30) as response:
                  return json.load(response)["data"]

          def get_raw_json(url):
              with urllib.request.urlopen(url, timeout=30) as response:
                  return json.load(response)

          actor = get_json(f"https://api.apify.com/v2/acts/{actor_id}?token={token}")
          if not actor.get("standbyUrl"):
              print("Standby URL was not found on Actor", file=sys.stderr)
              sys.exit(1)
          print(f"Apify Standby URL: {actor.get('standbyUrl')}")
          latest = (actor.get("taggedBuilds") or {}).get("latest") or {}
          build_id = latest.get("buildId")
          if not build_id:
              print("latest build tag was not found", file=sys.stderr)
              sys.exit(1)

          builds = get_json(f"https://api.apify.com/v2/acts/{actor_id}/builds?token={token}&limit=10&desc=1")
          build = next((item for item in builds.get("items", []) if item.get("id") == build_id), None)
          if not build:
              print(f"latest build {build_id} was not returned by the builds API", file=sys.stderr)
              sys.exit(1)

          status = build.get("status")
          print(f"Apify latest build {build_id} finished with status {status}")
          if status != "SUCCEEDED":
              sys.exit(1)

          openapi = get_raw_json(f"https://api.apify.com/v2/acts/{actor_id}/builds/default/openapi.json?token={token}")
          paths = openapi.get("paths") or {}
          for required_path in ("/", "/api/jobs", "/api/jobs/{jobId}", "/jobs/{jobId}"):
              if required_path not in paths:
                  print(f"Standby OpenAPI path missing: {required_path}", file=sys.stderr)
                  sys.exit(1)
          PY
