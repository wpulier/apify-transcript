name: Apify Standby Smoke Test

on:
  workflow_dispatch:
    inputs:
      standby_url:
        description: "Apify Standby base URL"
        required: true
        default: "https://esteemed-chimta--large-video-to-transcript.apify.actor"
      media_url:
        description: "Small direct media URL to transcribe"
        required: true
        default: "https://raw.githubusercontent.com/wpulier/apify-transcript/main/samples/large-video-to-transcript-sample.mp3"
      timeout_seconds:
        description: "Maximum seconds to wait for completion"
        required: true
        default: "900"
      reset_running_runs:
        description: "Abort currently running Actor runs before smoke test"
        required: true
        default: "false"
      job_mode:
        description: "Smoke path to test: url, upload, or both"
        required: true
        default: "url"

jobs:
  standby-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Submit and verify Standby transcript job
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          STANDBY_URL: ${{ inputs.standby_url }}
          MEDIA_URL: ${{ inputs.media_url }}
          TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
          RESET_RUNNING_RUNS: ${{ inputs.reset_running_runs }}
          JOB_MODE: ${{ inputs.job_mode }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
          import time
          import urllib.parse
          import urllib.error
          import urllib.request

          token = os.environ["APIFY_TOKEN"]
          standby_url = os.environ["STANDBY_URL"].rstrip("/")
          media_url = os.environ["MEDIA_URL"]
          timeout_seconds = int(os.environ["TIMEOUT_SECONDS"])
          reset_running_runs = os.environ.get("RESET_RUNNING_RUNS", "false").strip().lower() == "true"
          job_mode = os.environ.get("JOB_MODE", "url").strip().lower()
          actor_id = "kTgaX3cfI6dlJHa6J"

          def with_token(url):
              parsed = urllib.parse.urlparse(url)
              query = urllib.parse.parse_qsl(parsed.query, keep_blank_values=True)
              query.append(("token", token))
              return urllib.parse.urlunparse(parsed._replace(query=urllib.parse.urlencode(query)))

          def request_json(url, payload=None, method=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              headers = {
                  "Accept": "application/json",
              }
              if data is not None:
                  headers["Content-Type"] = "application/json"
              req = urllib.request.Request(with_token(url), data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{exc.code} {exc.reason}: {detail}") from exc

          def request_binary_json(url, payload, method="PUT"):
              req = urllib.request.Request(
                  with_token(url),
                  data=payload,
                  headers={
                      "Accept": "application/json",
                      "Content-Type": "application/octet-stream",
                  },
                  method=method,
              )
              try:
                  with urllib.request.urlopen(req, timeout=120) as response:
                      return json.load(response)
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{exc.code} {exc.reason}: {detail}") from exc

          def request_text(url, method="GET"):
              req = urllib.request.Request(with_token(url), method=method)
              try:
                  with urllib.request.urlopen(req, timeout=60) as response:
                      return response.status, response.read().decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  detail = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"{exc.code} {exc.reason}: {detail}") from exc

          def get_apify_json(path):
              url = f"https://api.apify.com/v2/{path.lstrip('/')}"
              return request_json(url)

          def post_apify_json(path):
              url = f"https://api.apify.com/v2/{path.lstrip('/')}"
              return request_json(url, {}, method="POST")

          def reset_running_actor_runs():
              if not reset_running_runs:
                  return
              runs = get_apify_json(f"acts/{actor_id}/runs?limit=8&desc=1")["data"]["items"]
              running = [run for run in runs if run.get("status") == "RUNNING"]
              for run in running:
                  run_id = run["id"]
                  print(f"Aborting running run before smoke test: {run_id}")
                  post_apify_json(f"actor-runs/{run_id}/abort")
              if running:
                  time.sleep(15)

          def print_run_log_tail(run_id):
              log_url = with_token(f"https://api.apify.com/v2/logs/{run_id}")
              try:
                  with urllib.request.urlopen(log_url, timeout=60) as response:
                      log_text = response.read().decode("utf-8", errors="replace")
              except Exception as exc:
                  print(f"Could not fetch log for {run_id}: {exc}")
                  return
              print(f"--- log tail for {run_id} ---")
              print("\n".join(log_text.splitlines()[-80:]))
              print(f"--- end log tail for {run_id} ---")

          def dump_diagnostics():
              try:
                  actor = get_apify_json(f"acts/{actor_id}")["data"]
                  print("Actor diagnostics:")
                  print(f"  standbyUrl={actor.get('standbyUrl')}")
                  print(f"  actorStandby={json.dumps(actor.get('actorStandby'), sort_keys=True)}")
                  print(f"  latestBuild={json.dumps((actor.get('taggedBuilds') or {}).get('latest'), sort_keys=True)}")
              except Exception as exc:
                  print(f"Could not fetch actor diagnostics: {exc}")
              try:
                  runs = get_apify_json(f"acts/{actor_id}/runs?limit=8&desc=1")["data"]["items"]
              except Exception as exc:
                  print(f"Could not fetch recent runs: {exc}")
                  return
              print("Recent runs:")
              for run in runs:
                  print(
                      f"  {run.get('id')} status={run.get('status')} "
                      f"origin={run.get('metaOrigin')} started={run.get('startedAt')} "
                      f"finished={run.get('finishedAt')} message={run.get('statusMessage')}"
                  )
              for run in runs[:4]:
                  print_run_log_tail(run.get("id"))

          def download_sample_media():
              req = urllib.request.Request(media_url, headers={"Accept": "*/*"})
              with urllib.request.urlopen(req, timeout=120) as response:
                  content = response.read()
                  content_type = response.headers.get("content-type") or "application/octet-stream"
              parsed_name = os.path.basename(urllib.parse.urlparse(media_url).path) or "standby-smoke-media.mp3"
              print(f"Downloaded sample media for upload smoke: {parsed_name}, bytes={len(content)}")
              return parsed_name, content_type.split(";")[0], content

          def submit_direct_url_job():
              print("Submitting direct URL Standby smoke job")
              created = request_json(f"{standby_url}/jobs", {"mediaUrl": media_url}, method="POST")
              return created

          def submit_chunked_upload_job():
              file_name, content_type, content = download_sample_media()
              print("Creating chunked upload Standby smoke job")
              created = request_json(
                  f"{standby_url}/jobs",
                  {"fileName": file_name, "fileSize": len(content), "contentType": content_type},
                  method="POST",
              )
              job = created["job"]
              job_id = created["jobId"]
              chunk_size = int(job["chunkSize"])
              total_chunks = int(job["totalChunks"])
              print(f"Upload Job ID: {job_id}")
              print(f"Upload Job URL: {created['jobUrl']}")
              print(f"Uploading {total_chunks} chunk(s), chunk_size={chunk_size}")
              for index in range(total_chunks):
                  start = index * chunk_size
                  end = min(len(content), start + chunk_size)
                  request_binary_json(f"{standby_url}/jobs/{job_id}/chunks/{index}", content[start:end])
                  print(f"Uploaded chunk {index + 1}/{total_chunks}")
              completed = request_json(f"{standby_url}/jobs/{job_id}/complete", {}, method="POST")
              return completed

          def poll_completed_job(job_id, label):
              deadline = time.monotonic() + timeout_seconds
              last_status = None
              job = None
              while time.monotonic() < deadline:
                  payload = request_json(f"{standby_url}/jobs/{job_id}/status")
                  job = payload["job"]
                  status = job.get("status")
                  message = job.get("message") or ""
                  if status != last_status:
                      print(f"Status: {status} - {message}")
                      last_status = status
                  if status in {"completed", "failed"}:
                      break
                  time.sleep(10)

              if not job:
                  raise RuntimeError(f"{label}: job status was never returned")
              if job.get("status") != "completed":
                  raise RuntimeError(f"{label}: Standby smoke job did not complete: {job.get('status')} {job.get('error')}")
              return job

          def verify_completed_job(job, label):
              artifacts = job.get("artifactUrls") or {}
              required = ["mp3", "txt", "json", "srt", "vtt", "quality.json", "zip"]
              missing = [key for key in required if not artifacts.get(key)]
              if missing:
                  raise RuntimeError(f"{label}: missing artifact URLs: {', '.join(missing)}")

              result = job.get("result") or {}
              print(
                  f"{label} completed: "
                  f"words={result.get('wordCount')} "
                  f"speakers={result.get('speakerCount')} "
                  f"charged={result.get('charged')} "
                  f"billableMinutes={result.get('billableMinutes')}"
              )
              if result.get("charged") is not True:
                  raise RuntimeError(f"{label}: smoke job completed but was not charged")

              for key in ("txt", "mp3", "zip"):
                  url = artifacts[key]
                  req = urllib.request.Request(url, method="GET")
                  with urllib.request.urlopen(req, timeout=60) as response:
                      if response.status >= 400:
                          raise RuntimeError(f"{label}: artifact {key} returned HTTP {response.status}")
                      size = response.headers.get("content-length") or "unknown"
                      print(f"{label} artifact {key}: downloadable, content-length={size}")

          def run_smoke_path(label, submitter):
              created = submitter()
              job_id = created["jobId"]
              job_url = created["jobUrl"]
              print(f"{label} Job ID: {job_id}")
              print(f"{label} Job URL: {job_url}")
              job = poll_completed_job(job_id, label)
              verify_completed_job(job, label)

          def main():
              if job_mode not in {"url", "upload", "both"}:
                  raise RuntimeError(f"Unsupported JOB_MODE: {job_mode}")
              reset_running_actor_runs()
              root_status, root_body = request_text(f"{standby_url}/")
              print(f"Root probe: status={root_status}, body_prefix={root_body[:80]!r}")
              if job_mode in {"url", "both"}:
                  run_smoke_path("direct URL", submit_direct_url_job)
              if job_mode in {"upload", "both"}:
                  run_smoke_path("chunked upload", submit_chunked_upload_job)
              print("Standby smoke test passed")

          try:
              main()
          except Exception:
              dump_diagnostics()
              raise
          PY
